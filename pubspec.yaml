name: background_remover
description: "Background remover app using MLKit Subject Segmentation."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # MLKit Subject Segmentation
  google_mlkit_subject_segmentation: ^0.0.3

  # Image picker from gallery/camera
  image_picker: ^1.1.2

  # Pixel-level image manipulation
  image: ^4.2.0

  # Save result to gallery
  gal: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
